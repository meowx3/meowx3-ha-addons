name: GPS NTP Server
description: High-precision Stratum 1 NTP server using GPS/PPS with UBLOX optimization and MQTT telemetry.
version: "1.0.0"
slug: gps-ntp-mqtt
url: "https://github.com/Meowx3/meowx3-ha-addons/edit/main/gps-ntp-mqtt"
webui: "http://[HOST]:[PORT:9080]"
host_network: true
discovery: ["gps-ntp-mqtt"]
image: "ghcr.io/meowx3/gps-ntp-mqtt"
arch:
  - aarch64
  - amd64
  - armv7

git_repository: https://github.com/Meowx3/gps-ntp-mqtt
startup: run.sh

# These options appear in the HA Addon Configuration UI panel
options:
  mqtt_host:
    description: "IP Address of your MQTT Broker"
    default: "192.168.1.50"
  mqtt_user:
    description: "MQTT Username"
    default: "homeassistant"
  mqtt_password:
    description: "MQTT Password"
    default: "password"
  gps_device:
    description: "USB Device path (e.g., /dev/ttyUSB0 or /dev/ttyACM0)"
    default: "/dev/ttyUSB0"

# Hardware access permissions
devices:
  - /dev/ttyUSB0:/dev/ttyUSB0
  - /dev/ttyACM0:/dev/ttyACM0

# Network ports to expose from the container to the host
ports:
  123/udp: 123   # NTP Port
  9080/tcp: 9080 # Web UI Dashboard Port

# Security settings
privileged: true # Required to access GPS hardware and conntrack table for NTP clients
