# GPS via SHM
refclock SHM 0 offset 0.0 delay 0.2 refid GPS poll 4

# PPS (higher priority)
refclock PPS /dev/pps0 lock GPS refid PPS prefer poll 3 dpoll -2

# Local network access
allow 10.0.0.0/8
allow 192.168.0.0/16

# Stability tuning
makestep 0.5 -1
rtcsync
maxupdateskew 100.0
minsamples 8
maxsamples 64

log tracking statistics measurements

driftfile /var/lib/chrony/drift
