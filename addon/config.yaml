name: "GPS NTP MQTT Server"
slug: "gps_ntp_mqtt"
version: "1.0.0"
description: "Offline NTP server using GPS + PPS with MQTT telemetry"
startup: services
boot: auto
init: false

arch:
  - aarch64
  - amd64

devices:
  - /dev/ttyUSB0
  - /dev/pps0

usb: true
privileged:
  - SYS_TIME

ports:
  "123/udp": 123

options:
  mqtt_host: core-mosquitto
  mqtt_port: 1883
  use_pps: true

schema:
  mqtt_host: str
  mqtt_port: int
  use_pps: bool

panel_icon: mdi:clock-outline
homeassistant_api: true
