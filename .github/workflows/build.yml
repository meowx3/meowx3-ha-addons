name: Builder

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  init:
    name: Initialize Build Matrix
    runs-on: ubuntu-latest
    outputs:
      architectures: ${{ steps.flags.outputs.architectures }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Determine Architectures
        id: flags
        uses: home-assistant/actions/helpers/prepare-multi-arch-matrix@master
        with:
          # Targets the current directory or paths where your addons live
          path: "./"

  build:
    name: Build Add-on
    needs: init
    runs-on: ubuntu-latest
    strategy:
      matrix:
        architecture: ${{ Jackson.parse(needs.init.outputs.architectures) }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push Image
        uses: home-assistant/actions/helpers/build-image@master
        with:
          account: ${{ github.repository_owner }}
          image: "home-assistant-addons"
          architecture: ${{ matrix.architecture }}
          path: "./"
          push: true
