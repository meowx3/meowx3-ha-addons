name: Build and Push Addon
on: 
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Updated from v3 to v4
      - name: Checkout code
        uses: actions/checkout@v4 

      # Updated from v2 to v3
      - name: Login to GHCR
        uses: docker/login-action@v3 
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      # Updated from v4 to v6 (the current stable version)
      - name: Build and push
        uses: docker/build-push-action@v6 
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
