---
name-template: 'Release $TAG'
tag-template: 'v$VERSION'
categories:
  - title: '🚀 Features'
    labels:
      - 'feature'
      - 'enhancement'
  - title: '🐛 Bug Fixes'
    labels:
      - 'bug'
      - 'fix'
change-template: '- $TITLE (#$NUMBER) @$AUTHOR'
template: |
  ## Changes in this release
  $CHANGES
