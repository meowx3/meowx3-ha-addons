name: "GPS NTP Server"
version: "1.0.0"
slug: "gps-ntp-mqtt"
description: "High precision NTP server using GPS/PPS and UBLOX optimization"
arch:
  - aarch64
  - amd64
boot: false
options:
  mqtt_server: "192.168.1.50"
  mqtt_user: "homeassistant"
  mqtt_password: "password"
ports:
  - 123/udp    # NTP
  - 8080/tcp   # Web Dashboard
devices:
  - /dev/ttyUSB0:/dev/ttyUSB0
  - /dev/ttyACM0:/dev/ttyACM0
